<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIX キョクナビ [タブレット用リモコン]</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #eef2f3;
            color: #333;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .connect-panel {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        .connect-panel input {
            padding: 10px;
            font-size: 16px;
            width: 60%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .connect-panel button {
            padding: 10px 15px;
            font-size: 16px;
            background: #00ccff;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        /* キョクナビ型UI */
        .tablet-screen {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .nav-header {
            background: #e60012;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .search-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .tab-btn {
            background: linear-gradient(#ff5f6d, #ffc371);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px rgba(0,0,0,0.1);
        }
        .tab-btn.song { background: linear-gradient(#2193b0, #6dd5ed); }
        
        .song-list {
            border: 1px solid #ddd;
            border-radius: 6px;
            height: 250px;
            overflow-y: auto;
            background: #fafafa;
        }
        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .reserve-btn {
            background: #e60012;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        /* リモコン操作パネル */
        .remote-ctrl {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .ctrl-btn {
            padding: 12px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="connect-panel">
        <h3><i class="fa-solid fa-link"></i> PCモニターとの接続リンク</h3>
        <input type="text" id="peer-id-input" placeholder="PC画面に表示されたIDを入力">
        <button onclick="connectToPC()">接続する</button>
        <span id="link-status" style="margin-left:10px; font-weight:bold; color:red;">未接続</span>
    </div>

    <div class="tablet-screen">
        <div class="nav-header">
            <span>キョクナビ AIX-550</span>
            <span><i class="fa-solid fa-wifi"></i> REMOTE</span>
        </div>

        <div class="search-tabs">
            <button class="tab-btn" onclick="filterSongs('all')"><i class="fa-solid fa-music"></i> 全曲リスト</button>
            <button class="tab-btn song" onclick="alert('周辺の最新曲を読み込みました')"><i class="fa-solid fa-fire"></i> 今月の人気曲</button>
        </div>

        <div class="song-list" id="song-list-view">
            </div>

        <div class="remote-ctrl">
            <button class="ctrl-btn" style="background:#e60012;" onclick="sendControl('stop')"><i class="fa-solid fa-square"></i> 演奏停止</button>
            <button class="ctrl-btn" style="background:#00a0e9;" onclick="sendControl('retry')"><i class="fa-solid fa-backward-step"></i> 歌い直し</button>
        </div>
    </div>

    <script>
        // カラオケ楽曲データベース
        const songsDatabase = [
            { title: "残酷な天使のテーゼ", artist: "高橋洋子", ytid: "o6A7nfEs5I8" },
            { title: "アイドル", artist: "YOASOBI", ytid: "ZRtdQ81jCUs" },
            { title: "新時代", artist: "Ado", ytid: "1FliVTcX8Yg" },
            { title: "シンデレラボーイ", artist: "Saucy Dog", ytid: "28x7nMMia80" }
        ];

        let peer = new Peer();
        let conn = null;

        window.onload = function() {
            renderSongs();
        };

        // タブレット側：リスト描画
        function renderSongs() {
            const view = document.getElementById("song-list-view");
            view.innerHTML = "";
            songsDatabase.forEach(song => {
                const item = document.createElement("div");
                item.className = "song-item";
                item.innerHTML = `
                    <div>
                        <div style="font-weight:bold; font-size:15px;">${song.title}</div>
                        <div style="font-size:12px; color:#666;">${song.artist}</div>
                    </div>
                    <button class="reserve-btn" onclick="reserveSong('${song.ytid}')">予約</button>
                `;
                view.appendChild(item);
            });
        }

        // PCにP2P通信で接続
        function connectToPC() {
            const targetId = document.getElementById("peer-id-input").value.trim();
            if (!targetId) {
                alert("IDを入力してください。");
                return;
            }

            document.getElementById("link-status").innerText = "接続中...";
            conn = peer.connect(targetId);

            conn.on('open', () => {
                document.getElementById("link-status").innerText = "接続完了";
                document.getElementById("link-status").style.color = "green";
                alert("PCモニターとのリンクに成功しました！");
            });

            conn.on('error', (err) => {
                document.getElementById("link-status").innerText = "接続エラー";
                document.getElementById("link-status").style.color = "red";
            });
        }

        // 曲を予約してPCへ送信
        function reserveSong(ytid) {
            if (!conn) {
                alert("まず最初にPCモニターへ接続してください。");
                return;
            }
            const song = songsDatabase.find(s => s.ytid === ytid);
            conn.send({
                type: 'reserve',
                song: song
            });
            alert(`「${song.title}」を予約送信しました！`);
        }

        // リモコンコマンド（停止・歌い直し）を送信
        function sendControl(action) {
            if (!conn) return;
            conn.send({ type: action });
        }
    </script>
</body>
</html>
